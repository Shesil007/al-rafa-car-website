<title>AL Rafa Car Accessories – Opening Hours</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    gap: 20px;
    padding: 20px;
  }

  .poster {
    width: 600px;
    min-height: 820px;
    background: linear-gradient(160deg, #0d0d0d 0%, #1c1c1c 40%, #0a0a0a 100%);
    border: 2px solid #c0392b;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 40px 50px;
    box-shadow: 0 0 80px rgba(192,57,43,0.35), 0 0 200px rgba(192,57,43,0.1);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 50px;
    height: 50px;
    border-color: #e74c3c;
    border-style: solid;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 3px 0 0 3px; }
  .corner.tr { top: 12px; right: 12px; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 3px 3px 0; }

  /* Background gear / circle decoration */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(192,57,43,0.08);
    pointer-events: none;
  }
  .bg-circle.c1 { width: 500px; height: 500px; top: -150px; right: -150px; }
  .bg-circle.c2 { width: 300px; height: 300px; bottom: -80px; left: -80px; border-color: rgba(192,57,43,0.05); }

  /* Speed lines */
  .lines {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 180px;
    overflow: hidden;
    opacity: 0.06;
  }
  .lines span {
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e74c3c, transparent);
    margin: 10px 0;
    animation: slideLine 3s linear infinite;
  }
  .lines span:nth-child(2) { animation-delay: 0.5s; width: 80%; margin-left: 10%; }
  .lines span:nth-child(3) { animation-delay: 1s; width: 60%; margin-left: 20%; }
  .lines span:nth-child(4) { animation-delay: 1.5s; width: 90%; }
  .lines span:nth-child(5) { animation-delay: 2s; width: 70%; margin-left: 15%; }
  @keyframes slideLine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Logo area */
  .logo-wrap {
    width: 320px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    position: relative;
    z-index: 2;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 15px rgba(231,76,60,0.6));
  }

  /* Title */
  .shop-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: #ffffff;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
    position: relative;
    z-index: 2;
  }
  .shop-name span {
    color: #e74c3c;
  }

  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: #888;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 6px;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }

  /* Divider */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c0392b);
  }
  .divider::after {
    background: linear-gradient(90deg, #c0392b, transparent);
  }
  .divider-icon {
    color: #e74c3c;
    font-size: 18px;
  }

  /* Hours heading */
  .hours-heading {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #e74c3c;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }

  /* Time cards */
  .time-cards {
    display: flex;
    gap: 24px;
    width: 100%;
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }

  .time-card {
    flex: 1;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 4px;
    padding: 22px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .time-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #e74c3c, transparent);
  }

  .time-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
  }

  .time-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .time-value {
    font-family: 'Orbitron', monospace;
    font-size: 30px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .time-value .ampm {
    font-size: 14px;
    color: #e74c3c;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: super;
  }

  /* Open all week */
  .badge {
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 10px 32px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }

  /* Days */
  .days-row {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }
  .day-pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #aaa;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px 10px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .day-pill.active {
    background: rgba(192,57,43,0.2);
    border-color: #c0392b;
    color: #fff;
  }

  /* Qatar flag strip */
  .qatar-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 2;
    margin-top: 4px;
  }
  .qatar-strip .flag { font-size: 20px; }
  .qatar-strip .loc {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Glow pulse on times */
  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 8px rgba(231,76,60,0.3); }
    50% { text-shadow: 0 0 24px rgba(231,76,60,0.8), 0 0 40px rgba(231,76,60,0.3); }
  }
  .time-value { animation: glowPulse 3s ease-in-out infinite; }
</style>

<!-- Download logic -->
<button id="downloadBtn" style="padding: 12px 24px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: bold; cursor: pointer; background: #e74c3c; color: #fff; border: none; border-radius: 6px; box-shadow: 0 4px 10px rgba(231,76,60,0.4); transition: transform 0.2s;">
  📸 Download as Image (for WhatsApp)
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  document.getElementById('downloadBtn').addEventListener('click', function() {
    const btn = this;
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Generating Image...';
    
    // Slight delay to ensure UI updates before freezing for screenshot
    setTimeout(() => {
      html2canvas(document.querySelector('.poster'), {
        scale: 2, // High resolution for mobile screens
        backgroundColor: '#0a0a0a',
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Al-Rafa-Store-Hours-Status.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        btn.innerHTML = '✅ Downloaded Successfully!';
        setTimeout(() => { btn.innerHTML = originalText; }, 3000);
      }).catch(err => {
        console.error("Error generating image:", err);
        btn.innerHTML = '❌ Download Failed';
        setTimeout(() => { btn.innerHTML = originalText; }, 3000);
      });
    }, 100);
  });
</script>
