<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Rafa WhatsApp Promo - Arabic</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d121f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif; /* Great Arabic typography */
        }

        .story-container {
            width: 414px; /* Typical mobile width */
            height: 736px; /* 16:9 ratio */
            background: linear-gradient(180deg, #1b2d48 0%, #0a1628 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Gold accents */
        .story-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #c4a050;
            margin: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
            z-index: 2;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .logo-text span {
            color: #c4a050;
        }

        .ar-brand {
            font-size: 18px;
            color: #c4a050;
            font-weight: 700;
        }

        .hero-img-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            margin: 20px 0;
        }

        .hero-img {
            width: 120%;
            height: 100%;
            background-image: url('images/nissan patrol image.webp'); /* Uses your local image */
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            position: absolute;
            top: 0; left: -10%;
        }

        .hero-img::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(10,22,40,0) 0%, #0a1628 100%);
        }

        .content {
            padding: 20px 30px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .main-headline {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .main-headline span {
            color: #c4a050;
        }

        .sub-headline {
            color: #d1d5db;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .brands-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .brand-tag {
            background: rgba(196, 160, 80, 0.15);
            border: 1px solid rgba(196, 160, 80, 0.5);
            color: #c4a050;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }

        .cta-box {
            background: #25D366; /* WhatsApp Green */
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .contact-number {
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            margin-top: 15px;
            letter-spacing: 1px;
            direction: ltr; /* Keeps number correct */
            display: inline-block;
        }
        
        .instruction {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

    </style>
</head>
<body>

    <div class="story-container">
        <!-- Header -->
        <div class="header">
            <div class="logo-text">AL RAFA <span>AUTO</span></div>
            <div class="ar-brand">الرفعة لإكسسوارات السيارات</div>
        </div>

        <!-- Image Area -->
        <div class="hero-img-container">
            <div class="hero-img"></div>
        </div>

        <!-- Content Area -->
        <div class="content">
            <h1 class="main-headline">
                جدد سيارتك بقطع <br><span>أصلية ١٠٠٪</span>
            </h1>
            
            <p class="sub-headline">
                الوجهة الأولى في قطر للإكسسوارات وقطع الغيار
            </p>

            <div class="brands-tags">
                <span class="brand-tag">تويوتا</span>
                <span class="brand-tag">نيسان</span>
                <span class="brand-tag">لكزس</span>
            </div>

            <div class="cta-box pulse">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
                </svg>
                تواصل معنا للطلب
            </div>
            
            <div class="contact-number">+974 3049 6000</div>
            <div class="instruction">اسحب الشاشة للأعلى للتواصل 👆</div>
        </div>
    </div>

</body>
</html>
